<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>调酒笔记</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Onboarding -->
    <div id="viewOnboarding" class="view on">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;padding:40px 20px;background:#FBF7F2">
        <div style="font-size:64px;animation:pulse 1.5s ease-in-out infinite">🍸</div>
        <div style="font-size:20px;font-weight:700;color:#3D2C2C;font-family:-apple-system,'SF Pro','PingFang SC','Helvetica Neue',sans-serif">调酒笔记</div>
        <div style="font-size:15px;color:#8B7E74;font-family:-apple-system,'SF Pro','PingFang SC','Helvetica Neue',sans-serif">正在准备你的酒柜...</div>
        <div style="margin-top:24px;width:120px;height:3px;background:#EDE4DA;border-radius:2px;overflow:hidden">
          <div style="width:40%;height:100%;background:#E8734A;border-radius:2px;animation:slide 1s ease-in-out infinite"></div>
        </div>
      </div>
    </div>
    <style>
      @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.1); } }
      @keyframes slide { 0% { transform:translateX(-100%); } 100% { transform:translateX(350%); } }
    </style>
    <!-- Recipes -->
    <div id="viewRecipes" class="view"></div>
    <!-- Recipe Detail -->
    <div id="viewRecipeDetail" class="view"></div>
    <!-- Random -->
    <div id="viewRandom" class="view"></div>
    <!-- Inventory -->
    <div id="viewInventory" class="view"></div>
    <!-- Shopping -->
    <div id="viewShopping" class="view"></div>
    <!-- Tutorials -->
    <div id="viewTutorials" class="view"></div>
    <!-- Settings -->
    <div id="viewSettings" class="view"></div>
    <!-- Tutorial Detail -->
    <div id="viewTutorialDetail" class="view"></div>
    <!-- Timer Overlay -->
    <div id="timerOverlay" class="overlay"></div>
  </div>
  <nav id="tabBar">
    <button data-view="viewRecipes"><span class="tab-icon">📖</span><span>配方</span></button>
    <button data-view="viewRandom"><span class="tab-icon">🎲</span><span>随便来一杯</span></button>
    <button data-view="viewInventory"><span class="tab-icon">🍾</span><span>酒柜</span></button>
    <button data-view="viewShopping"><span class="tab-icon">🛒</span><span>购物</span></button>
    <button data-view="viewTutorials"><span class="tab-icon">📚</span><span>教程</span></button>
  </nav>
  <div id="toast" class="toast"></div>
  <noscript>
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;padding:40px;text-align:center;font-size:16px;color:#3D2C2C">
      <div><div style="font-size:48px;margin-bottom:16px">🍸</div><div style="font-weight:600;margin-bottom:8px">调酒笔记</div><div>请开启 JavaScript 以使用此应用</div></div>
    </div>
  </noscript>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-app-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-firestore-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-auth-compat.min.js"></script>
  <script src="recipes.js"></script>
  <script src="app.js"></script>
</body>
</html>
